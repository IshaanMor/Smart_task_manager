{% extends "base.html" %}

{% block content %}
<div class="card mx-auto shadow-sm rounded-4 border-0 bg-white bg-opacity-10" style="max-width: 720px;">
    <div class="card-body p-5">
        <h2 class="card-title mb-4">Edit Task</h2>
        <form method="POST">
            <div class="row g-3">
                <div class="col-12">
                    <label for="title" class="form-label text-white">Title</label>
                    <input id="title" name="title" value="{{ task.title }}" class="form-control bg-dark text-white border-secondary" required />
                </div>
                <div class="col-12">
                    <label for="description" class="form-label text-white">Description</label>
                    <textarea id="description" name="description" rows="4" class="form-control bg-dark text-white border-secondary">{{ task.description }}</textarea>
                </div>
                <div class="col-md-4">
                    <label for="status" class="form-label text-white">Status</label>
                    <select id="status" name="status" class="form-select bg-dark text-white border-secondary">
                        <option value="Pending" {% if task.status == 'Pending' %}selected{% endif %}>Pending</option>
                        <option value="In Progress" {% if task.status == 'In Progress' %}selected{% endif %}>In Progress</option>
                        <option value="Complete" {% if task.status == 'Complete' %}selected{% endif %}>Complete</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label for="priority" class="form-label text-white">Priority</label>
                    <select id="priority" name="priority" class="form-select bg-dark text-white border-secondary">
                        <option value="Low" {% if task.priority == 'Low' %}selected{% endif %}>Low</option>
                        <option value="Medium" {% if task.priority == 'Medium' %}selected{% endif %}>Medium</option>
                        <option value="High" {% if task.priority == 'High' %}selected{% endif %}>High</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label for="due_date" class="form-label text-white">Due Date</label>
                    <input id="due_date" name="due_date" type="date" value="{{ task.due_date }}" class="form-control bg-dark text-white border-secondary" />
                </div>
            </div>
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-center gap-3 mt-4">
                <button type="submit" class="btn btn-primary btn-lg">Save Changes</button>
                <a href="{{ url_for('dashboard') }}" class="btn btn-outline-light btn-lg">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
